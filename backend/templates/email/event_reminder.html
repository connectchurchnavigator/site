<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Reminder</title>
</head>
<body style="margin:0;padding:0;font-family:Arial,sans-serif;background:#f4f4f4">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4;padding:20px 0">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)">
<tr><td style="background:#1a0d3d;padding:30px;text-align:center">
<h1 style="margin:0;color:#fff;font-size:28px">Event Tomorrow 📅</h1>
</td></tr>
<tr><td style="padding:40px 30px">
<p style="font-size:16px;color:#333;line-height:1.6;margin:0 0 20px">Hi {{user_name}},</p>
<p style="font-size:16px;color:#333;line-height:1.6;margin:0 0 20px">This is a friendly reminder that you're registered for an event tomorrow!</p>
<div style="background:#f9f9f9;border-left:4px solid #d97706;padding:20px;margin:30px 0">
<h3 style="margin:0 0 15px;font-size:18px;color:#1a0d3d">{{event_name}}</h3>
<p style="margin:0 0 10px;font-size:14px;color:#666"><strong style="color:#333">Date:</strong> {{event_date}}</p>
<p style="margin:0 0 10px;font-size:14px;color:#666"><strong style="color:#333">Time:</strong> {{event_time}}</p>
<p style="margin:0;font-size:14px;color:#666"><strong style="color:#333">Location:</strong> {{event_location}}</p>
</div>
<div style="text-align:center;margin:30px 0">
<a href="{{event_url}}" style="display:inline-block;background:#d97706;color:#fff;padding:14px 32px;text-decoration:none;border-radius:6px;font-weight:600;font-size:16px">View Event Details</a>
</div>
<p style="font-size:14px;color:#666;line-height:1.6;margin:30px 0 0">See you there! 🙏</p>
</td></tr>
<tr><td style="background:#f9f9f9;padding:20px 30px;text-align:center;border-top:1px solid #eee">
<p style="margin:0;font-size:12px;color:#999">Powered by <a href="{{base_url}}" style="color:#1a0d3d;text-decoration:none;font-weight:600">ChurchNavigator</a></p>
<p style="margin:10px 0 0;font-size:12px;color:#999">UK's Leading Church Directory</p>
</td></tr>
</table>
</td></tr>
</table>
</body>
</html>
