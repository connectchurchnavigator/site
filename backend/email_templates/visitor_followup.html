<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Thank you for visiting {{ church_name }}</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background-color: #4F46E5; color: white; padding: 20px; border-radius: 8px 8px 0 0;">
        <h1 style="margin: 0;">{{ church_name }}</h1>
    </div>
    
    <div style="background-color: white; padding: 30px; border: 1px solid #e5e7eb;">
        <p style="font-size: 16px; margin-top: 0;">Dear {{ visitor_name }},</p>
        
        <div style="font-size: 16px; line-height: 1.8; color: #1f2937;">
            {{ message }}
        </div>
    </div>
    
    <div style="background-color: #f9fafb; padding: 20px; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 8px 8px;">
        <p style="margin: 0; color: #6b7280; font-size: 14px; text-align: center;">
            {{ church_name }} | Sent via ChurchNavigator
        </p>
    </div>
</body>
</html>
